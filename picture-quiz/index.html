<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💣 그림 퀴즈</title>
    <meta name="description" content="이미지를 업로드하고 폭탄 타이머와 함께 퀴즈를 진행하는 프로그램">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============ SETUP SCREEN ============ -->
    <div id="setup-screen" class="screen active">
        <div class="setup-header">
            <h1 id="setup-title">💣 그림 퀴즈 설정</h1>
            <p class="setup-subtitle">이미지를 업로드하고 정답을 입력한 후 퀴즈를 시작하세요!</p>
        </div>

        <div class="setup-toolbar">
            <div class="timer-setting">
                <label for="timer-input">⏱ 타이머(초)</label>
                <input type="number" id="timer-input" value="5" min="1" max="600">
            </div>
            <div class="bulk-upload-wrap">
                <button id="bulk-upload-btn" class="btn-bulk">📂 이미지 한꺼번에 업로드</button>
                <input type="file" id="bulk-file-input" accept="image/*" multiple hidden>
            </div>
            <div class="set-io-wrap">
                <button id="save-set-btn" class="btn-bulk btn-save">💾 세트 저장</button>
                <button id="load-set-btn" class="btn-bulk btn-load">📥 세트 불러오기</button>
                <input type="file" id="load-set-input" accept=".json" hidden>
            </div>
            <div class="question-counter">
                <span id="registered-count">0</span> 개 문제 등록됨
            </div>
        </div>

        <div class="question-grid" id="question-grid">
            <!-- Cards generated by JS -->
        </div>

        <button id="add-card-btn" class="btn-bulk" style="margin: 20px 0;">➕ 문제 추가</button>

        <button id="start-btn" class="btn-start" disabled>🎮 퀴즈 준비!</button>
    </div>

    <!-- ============ READY SCREEN ============ -->
    <div id="ready-screen" class="screen">
        <div class="ready-content" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px;">
            <div style="font-size: 5rem;">🤫</div>
            <h1 style="font-size: 3rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">준비되셨나요?</h1>
            <p style="color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 20px;">모두 조용! 이제 폭탄 퀴즈를 시작합니다.</p>
            <button id="real-start-btn" class="btn-start" style="margin-bottom: 10px;">🚀 진짜 시작!</button>
            <button id="cancel-start-btn" class="btn-control">취소하고 돌아가기</button>
        </div>
    </div>

    <!-- ============ QUIZ SCREEN ============ -->
    <div id="quiz-screen" class="screen">
        <!-- Question number top-left -->
        <div class="quiz-header">
            <div class="question-number" id="question-number">Q.1</div>
            <div class="quiz-controls">
                <button id="pause-btn" class="btn-control">⏸ 일시정지</button>
                <button id="stop-btn" class="btn-control btn-danger">⏹ 정지</button>
                <div class="quiz-progress" id="quiz-progress">1 / 21</div>
            </div>
        </div>

        <!-- Image center -->
        <div class="quiz-content">
            <div class="image-container" id="image-container">
                <img id="quiz-image" src="" alt="퀴즈 이미지">
            </div>
        </div>

        <!-- Bomb timer bottom-right -->
        <div class="bomb-container" id="bomb-container"></div>

        <!-- Answer overlay -->
        <div class="answer-overlay" id="answer-overlay">
            <div class="answer-inner">
                <div class="answer-label">💥 정답</div>
                <div class="answer-text" id="answer-text"></div>
                <button id="next-btn" class="btn-next">다음 문제 →</button>
            </div>
        </div>

        <!-- Explosion overlay -->
        <div class="explosion-overlay" id="explosion-overlay"></div>
    </div>

    <!-- ============ END SCREEN ============ -->
    <div id="end-screen" class="screen">
        <div class="end-content">
            <div class="end-emoji">🎉</div>
            <h1 id="end-title">퀴즈 완료!</h1>
            <p class="end-subtitle">총 <span id="end-total">0</span>문제를 풀었습니다</p>
            <button id="restart-btn" class="btn-restart">🔄 다시 시작</button>
        </div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
